<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild West Stock Tracker</title>

<style>
body {
    margin: 0;
    font-family: ui-monospace, monospace;
    background: #070a0f;
    color: #d1d5db;
}

/* TOP */
.topbar {
    padding: 12px;
    background: #0f172a;
    border-bottom: 1px solid #1f2937;
    display: flex;
    justify-content: space-between;
}

/* LAYOUT */
.wrapper {
    display: flex;
    height: calc(100vh - 48px);
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: #0b1220;
    border-right: 1px solid #1f2937;
    padding: 10px;
}

.tab {
    padding: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    background: #0f172a;
    border: 1px solid #1f2937;
    font-size: 12px;
}

.active {
    border-color: #22c55e;
    color: #22c55e;
}

/* MAIN */
.main {
    flex: 1;
    padding: 12px;
    overflow: auto;
}

.search {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    background: #0f172a;
    border: 1px solid #1f2937;
    color: white;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    background: #0b1220;
}

th {
    text-align: left;
    font-size: 11px;
    color: #9ca3af;
    padding: 10px;
    border-bottom: 1px solid #1f2937;
}

td {
    padding: 10px;
    border-bottom: 1px solid #1f2937;
    font-size: 13px;
}

tr:hover {
    background: #0f172a;
}

.up { color: #22c55e; }
.down { color: #ef4444; }
.flat { color: #facc15; }
</style>
</head>

<body>

<div class="topbar">
    <div>WILD WEST MARKET TERMINAL</div>
    <div>● LIVE DATABASE</div>
</div>

<div class="wrapper">

<!-- LEFT -->
<div class="sidebar">

<div class="tab active" onclick="setView('auction', this)">AUCTION HOUSE</div>
<div class="tab" onclick="setView('events', this)">EVENT ITEMS</div>

</div>

<!-- MAIN -->
<div class="main">

<input class="search" id="search" onkeyup="render()" placeholder="SEARCH ITEMS...">

<table>
<thead>
<tr>
<th>ITEM</th>
<th>TYPE</th>
<th>PRICE</th>
<th>BID</th>
<th>TREND</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

</div>

<script>

let view = "auction";

/* AUCTION ITEMS */
let auction = [
    /* 🔫 GUNS */
    {
        name:"Guycot Chain Pistol",
        type:"Gun",
        price:"$20,000",
        bid:"$7,000",
        trend:"up"
    },
    {
        name:"Schwarzlose Prototype Pistol",
        type:"Gun",
        price:"$60,000",
        bid:"$21,000",
        trend:"up"
    },
    {
        name:"Lancaster Pistol",
        type:"Gun",
        price:"$60,000",
        bid:"$21,000",
        trend:"flat"
    },
    {
        name:"Paterson Navy",
        type:"Revolver",
        price:"$80,000",
        bid:"$28,000",
        trend:"up",
        description:"A large 6 shot single action revolver."
    },
    {
        name:"Admiral's Axegonne",
        type:"Gun",
        price:"$100,000",
        bid:"$35,000",
        trend:"up"
    },
    {
        name:"Spitfire Revolving Sniper",
        type:"Sniper Rifle",
        price:"$120,000+",
        bid:"$42,000",
        trend:"up"
    },
    {
        name:"Jezail Musket",
        type:"Musket",
        price:"$80,000+",
        bid:"$28,000",
        trend:"up"
    },

    /* 🗡️ MELEE */
    {
        name:"Kukri Machete",
        type:"Melee",
        price:"$80,000",
        bid:"$28,000",
        trend:"up",
        description:"A massive machete used as a multitool. High damage knife that can take out a player in two powerful overhead stabs."
    }
];

/* EVENT ITEMS (ALL IN ONE SECTION) */
let events = [
    {name:"Remains", type:"Loot", price:"N/A", bid:"N/A", trend:"flat"},
    {name:"Cursed Lantern", type:"Tool", price:"N/A", bid:"N/A", trend:"flat"},
    {name:"Occult Sawed Off", type:"Weapon", price:"N/A", bid:"N/A", trend:"flat"},
    {name:"Skinwalker Bone", type:"Loot", price:"N/A", bid:"N/A", trend:"flat"},
    {name:"Candy Cane", type:"Weapon", price:"N/A", bid:"N/A", trend:"flat"},
    {name:"Festive Sharps", type:"Weapon", price:"N/A", bid:"N/A", trend:"flat"},
];

function setView(v, el){
    view = v;

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");

    render();
}

function getTrend(t){
    if(t === "up") return `<span class="up">▲</span>`;
    if(t === "down") return `<span class="down">▼</span>`;
    return `<span class="flat">➜</span>`;
}

function render(){

    let search = document.getElementById("search").value.toUpperCase();
    let tbody = document.getElementById("table");

    tbody.innerHTML = "";

    let list = view === "auction" ? auction : events;

    list.forEach(item => {

        if(!item.name.toUpperCase().includes(search)) return;

        tbody.innerHTML += `
        <tr>
            <td>${item.name}</td>
            <td>${item.type}</td>
            <td>${item.price}</td>
            <td>${item.bid}</td>
            <td>${getTrend(item.trend)}</td>
        </tr>
        `;
    });
}

render();

</script>

</body>
</html>
