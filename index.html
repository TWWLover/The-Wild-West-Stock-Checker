<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wild West Item Tracker</title>

<style>
body {
    margin: 0;
    font-family: system-ui, Arial;
    background: #0b0f14;
    color: #e6e6e6;
}

.topbar {
    padding: 14px;
    background: #111827;
    border-bottom: 1px solid #1f2937;
    display: flex;
    justify-content: space-between;
}

.container {
    padding: 20px;
}

.search {
    width: 100%;
    padding: 10px;
    margin-bottom: 16px;
    background: #111827;
    border: 1px solid #1f2937;
    color: white;
    border-radius: 6px;
    outline: none;
}

.section-title {
    margin: 18px 0 10px;
    font-size: 14px;
    color: #9ca3af;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.card {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    margin-bottom: 8px;
    background: #0f172a;
    border: 1px solid #1f2937;
    border-radius: 6px;
}

.name {
    font-weight: 600;
}

.meta {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 2px;
}

.price {
    color: #facc15;
    font-weight: 600;
}

.bid {
    font-size: 11px;
    color: #9ca3af;
}

</style>
</head>

<body>

<div class="topbar">
    <div>The Wild West Tracker</div>
    <div>Database View</div>
</div>

<div class="container">

<input class="search" id="search" onkeyup="render()" placeholder="Search items...">

<div id="content"></div>

</div>

<script>

let data = [
    // 🎵 Instruments
    {name:"Harmonica", type:"instrument", price:2000, bid:700},
    {name:"Drum", type:"instrument", price:2000, bid:700},
    {name:"Flute", type:"instrument", price:4000, bid:1400},
    {name:"Trumpet", type:"instrument", price:6000, bid:2100},
    {name:"Fiddle", type:"instrument", price:8000, bid:2800},
    {name:"Guitar", type:"instrument", price:10000, bid:3500},
    {name:"Accordion", type:"instrument", price:10000, bid:3500},
];

function render(){

    let search = document.getElementById("search").value.toUpperCase();
    let content = document.getElementById("content");

    content.innerHTML = "";

    let instruments = data.filter(i => i.type === "instrument");

    // SECTION TITLE
    content.innerHTML += `<div class="section-title">🎵 Instruments</div>`;

    instruments.forEach(item => {

        if(!item.name.toUpperCase().includes(search)) return;

        content.innerHTML += `
        <div class="card">
            <div>
                <div class="name">${item.name}</div>
                <div class="meta">Type: Instrument</div>
            </div>

            <div style="text-align:right">
                <div class="price">$${item.price.toLocaleString()}</div>
                <div class="bid">Starting Bid: $${item.bid.toLocaleString()}</div>
            </div>
        </div>
        `;
    });
}

render();

</script>

</body>
</html>
