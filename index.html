<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild West Market Tracker</title>

<link rel="icon" type="image/png" href="favicon.png?v=2">

<style>
body {
    margin: 0;
    font-family: ui-monospace, monospace;
    background: #070a0f;
    color: #d1d5db;
}

.topbar {
    padding: 12px;
    background: #0f172a;
    border-bottom: 1px solid #1f2937;
    display: flex;
    justify-content: space-between;
}

.wrapper {
    display: flex;
    height: calc(100vh - 48px);
}

.sidebar {
    width: 240px;
    background: #0b1220;
    border-right: 1px solid #1f2937;
    padding: 10px;
}

.tab {
    padding: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    background: #0f172a;
    border: 1px solid #1f2937;
    font-size: 12px;
}

.active {
    border-color: #22c55e;
    color: #22c55e;
}

.main {
    flex: 1;
    padding: 12px;
    overflow: auto;
}

.search {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    background: #0f172a;
    border: 1px solid #1f2937;
    color: white;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #0b1220;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #1f2937;
    font-size: 13px;
}

tr:hover {
    background: #0f172a;
}

.up { color: #22c55e; }
.down { color: #ef4444; }
.flat { color: #facc15; }

#preview {
    position: fixed;
    right: 20px;
    top: 80px;
    width: 260px;
    background: #0b1220;
    border: 1px solid #1f2937;
    padding: 10px;
    font-size: 12px;
    display: none;
}

#reportModal {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#0b1220;
    border:1px solid #1f2937;
    padding:15px;
    width:320px;
    z-index:999;
    color:white;
}
</style>
</head>

<body>

<script>
/* =========================
   MAINTENANCE MODE SWITCH
========================= */
const MAINTENANCE_MODE = true;

if (MAINTENANCE_MODE) {
    document.write(`
        <div style="
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#070a0f;
            color:white;
            font-family:Arial;
            font-size:40px;
            font-weight:bold;
        ">
        Currently Down for Maintenance
        </div>
    `);
    throw new Error("Maintenance Mode Active");
}
</script>

<div class="topbar">
    <div>WILD WEST MARKET TERMINAL</div>
    <div>● DATABASE ACTIVE</div>
</div>

<div class="wrapper">

<div class="sidebar">
    <div class="tab active" onclick="setView('auction', this)">AUCTION HOUSE</div>
    <div class="tab" onclick="setView('events', this)">EVENT ITEMS</div>
    <div class="tab" onclick="setView('about', this)">ABOUT</div>
</div>

<div class="main">
<input class="search" id="search" onkeyup="render()" placeholder="SEARCH ITEMS...">

<table>
<thead>
<tr>
<th>ITEM</th>
<th>TYPE</th>
<th>PRICE</th>
<th>BID</th>
<th>TREND</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<div id="preview"></div>

<div id="reportModal">
<h3>Report Bug</h3>
<div id="reportItemName"></div>
<textarea id="reportText" style="width:100%;height:100px;"></textarea>
<br><br>
<button onclick="sendReport()">Send Report</button>
<button onclick="closeReport()">Cancel</button>
</div>

<script>

let view = "auction";
let currentItem = null;
let lastReportTime = 0;
const COOLDOWN = 10000;

/* DATA */
let auction = [
    { name:"Guycot Chain Pistol", type:"Gun", price:"$20,000", bid:"$7,000", trend:"up", description:"30-shot automatic pistol." },
    { name:"Schwarzlose Prototype Pistol", type:"Gun", price:"$60,000", bid:"$21,000", trend:"up", description:"Auto pistol." }
];

let events = [
    { name:"Cursed Lantern", type:"Tool", price:"N/A", bid:"N/A", trend:"flat", description:"Event item." }
];

let about = [
    { title:"Wild West Market Terminal", text:"Stock tracker system." }
];

function setView(v, el){
    view = v;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    render();
}

function getTrend(t){
    if(t==="up") return "▲";
    if(t==="down") return "▼";
    return "➜";
}

function openReport(item){
    currentItem = item;
    document.getElementById("reportModal").style.display="block";
    document.getElementById("reportItemName").innerText = item.name;
}

function closeReport(){
    document.getElementById("reportModal").style.display="none";
}

function sendReport(){
    const now = Date.now();
    const text = document.getElementById("reportText").value;

    if(!text) return alert("Type something");

    if(now - lastReportTime < COOLDOWN){
        return alert("Wait a bit");
    }

    lastReportTime = now;

    fetch("PASTE_WEBHOOK_HERE", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            content:`🐛 Bug Report
Item: ${currentItem.name}
Bug: ${text}`
        })
    });

    alert("Sent!");
    closeReport();
}

function render(){
    let search = document.getElementById("search").value.toUpperCase();
    let tbody = document.getElementById("table");
    tbody.innerHTML="";

    let list = view==="auction"?auction:events;

    list.forEach(item=>{
        if(!item.name.toUpperCase().includes(search)) return;

        tbody.innerHTML += `
        <tr onclick='openReport(${JSON.stringify(item)})'>
            <td>${item.name}</td>
            <td>${item.type}</td>
            <td>${item.price}</td>
            <td>${item.bid}</td>
            <td>${getTrend(item.trend)}</td>
        </tr>`;
    });
}

render();

</script>

</body>
</html>
