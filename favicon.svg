<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <style>
      .rifle-stock { fill: #8B4513; }
      .rifle-barrel { fill: #A9A9A9; }
      .rifle-metal { fill: #D4AF37; }
      .rifle-accent { fill: #654321; }
      .rifle-wood-detail { fill: #704020; }
    </style>
  </defs>
  
  <!-- Background for visibility -->
  <rect width="512" height="512" fill="#070a0f" opacity="0.1"/>
  
  <!-- Tilted rifle group (rotated -15 degrees) -->
  <g transform="translate(256, 256) rotate(-15) translate(-256, -256)">
    
    <!-- Main stock (wood) - VERY LARGE -->
    <path class="rifle-stock" d="M 80 240 L 160 220 L 170 260 L 90 280 Z"/>
    <ellipse class="rifle-stock" cx="100" cy="250" rx="40" ry="50"/>
    
    <!-- Stock wood grain details -->
    <path class="rifle-wood-detail" d="M 85 230 Q 100 235 115 233" stroke="#704020" stroke-width="2" fill="none"/>
    <path class="rifle-wood-detail" d="M 85 250 Q 100 255 115 253" stroke="#704020" stroke-width="2" fill="none"/>
    <path class="rifle-wood-detail" d="M 85 270 Q 100 275 115 273" stroke="#704020" stroke-width="2" fill="none"/>
    
    <!-- Stock details - circular inlays - BIGGER -->
    <circle class="rifle-metal" cx="110" cy="230" r="8"/>
    <circle class="rifle-metal" cx="130" cy="240" r="8"/>
    <circle class="rifle-metal" cx="150" cy="250" r="8"/>
    <circle class="rifle-metal" cx="130" cy="270" r="8"/>
    
    <!-- Trigger guard - LARGER -->
    <path class="rifle-metal" d="M 150 250 Q 170 270 180 270 L 180 240 Q 170 240 150 240 Z" fill="none" stroke="#D4AF37" stroke-width="6"/>
    
    <!-- Barrel (silver/gray) - VERY LONG AND PROMINENT -->
    <rect class="rifle-barrel" x="170" y="230" width="280" height="30" rx="15"/>
    
    <!-- Barrel shine effect -->
    <rect class="rifle-barrel" x="170" y="230" width="280" height="10" rx="5" opacity="0.7" fill="#E8E8E8"/>
    
    <!-- Barrel bands (gold) - BIGGER -->
    <rect class="rifle-metal" x="200" y="224" width="16" height="42" rx="8"/>
    <rect class="rifle-metal" x="260" y="224" width="16" height="42" rx="8"/>
    <rect class="rifle-metal" x="320" y="224" width="16" height="42" rx="8"/>
    <rect class="rifle-metal" x="380" y="224" width="16" height="42" rx="8"/>
    
    <!-- Front sight - LARGER -->
    <rect class="rifle-metal" x="420" y="220" width="10" height="35" rx="5"/>
    <rect class="rifle-metal" x="416" y="216" width="18" height="8" rx="4"/>
    
    <!-- Muzzle - BIGGER -->
    <circle class="rifle-barrel" cx="450" cy="245" r="12"/>
    <circle class="rifle-metal" cx="450" cy="245" r="10"/>
    
    <!-- Top scope rail - LARGER -->
    <rect class="rifle-metal" x="190" y="216" width="230" height="10" rx="5"/>
    
    <!-- Scope - MUCH BIGGER -->
    <g transform="translate(280, 180)">
      <!-- Scope body -->
      <ellipse class="rifle-barrel" cx="0" cy="0" rx="35" ry="50"/>
      <rect class="rifle-barrel" x="-20" y="-50" width="40" height="20" rx="10"/>
      
      <!-- Scope glass -->
      <ellipse class="rifle-metal" cx="0" cy="0" rx="30" ry="45" opacity="0.6"/>
      <circle class="rifle-accent" cx="0" cy="0" r="20" opacity="0.8"/>
      
      <!-- Scope crosshair -->
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#22c55e" stroke-width="2"/>
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#22c55e" stroke-width="2"/>
    </g>
    
    <!-- Hammer detail -->
    <path class="rifle-metal" d="M 155 230 Q 165 220 175 225" stroke="#D4AF37" stroke-width="4" fill="none"/>
    
  </g>
</svg>